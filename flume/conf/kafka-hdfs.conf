# Flume Agent: Kafka -> HDFS
agent1.sources = kafka-source
agent1.channels = mem-channel
agent1.sinks = hdfs-sink

# Source: Kafka
agent1.sources.kafka-source.type = org.apache.flume.source.kafka.KafkaSource
agent1.sources.kafka-source.channels = mem-channel
agent1.sources.kafka-source.kafka.bootstrap.servers = kafka:9092
agent1.sources.kafka-source.kafka.topics = user_behavior_topic
agent1.sources.kafka-source.kafka.consumer.group.id = flume-hdfs-group
agent1.sources.kafka-source.batchSize = 500
agent1.sources.kafka-source.batchDurationMillis = 2000

# Channel: memory
agent1.channels.mem-channel.type = memory
agent1.channels.mem-channel.capacity = 20000
agent1.channels.mem-channel.transactionCapacity = 2000
agent1.channels.mem-channel.byteCapacityBufferPercentage = 20
agent1.channels.mem-channel.byteCapacity = 80000000

# Sink: HDFS
agent1.sinks.hdfs-sink.type = hdfs
agent1.sinks.hdfs-sink.channel = mem-channel
agent1.sinks.hdfs-sink.hdfs.path = hdfs://namenode:9000/user/flume/events/%Y-%m-%d/%H
agent1.sinks.hdfs-sink.hdfs.filePrefix = events-
agent1.sinks.hdfs-sink.hdfs.fileType = DataStream
agent1.sinks.hdfs-sink.hdfs.writeFormat = Text
agent1.sinks.hdfs-sink.hdfs.rollInterval = 60
agent1.sinks.hdfs-sink.hdfs.rollSize = 134217728
agent1.sinks.hdfs-sink.hdfs.rollCount = 0
agent1.sinks.hdfs-sink.hdfs.idleTimeout = 120
agent1.sinks.hdfs-sink.hdfs.useLocalTimeStamp = true
agent1.sinks.hdfs-sink.hdfs.callTimeout = 30000
agent1.sinks.hdfs-sink.hdfs.threadsPoolSize = 10
agent1.sinks.hdfs-sink.hdfs.batchSize = 1000
